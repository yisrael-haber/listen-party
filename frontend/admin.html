<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Listen Party Admin</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body class="admin-page">
  <main>
    <header class="brand">
      <h1>Admin</h1>
      <p>Listen Party configuration</p>
    </header>

    <section class="controls admin-controls">
      <button id="rescan" type="button">Rescan</button>
      <div class="scan-status-group">
        <span id="rescanStatus" class="status" role="status" aria-live="polite"></span>
        <span id="scanStatus" class="status"></span>
      </div>
    </section>

    <section class="config-panel">
      <div class="section-head">
        <h2>Config</h2>
        <span id="configStatus" class="status" role="status" aria-live="polite"></span>
      </div>
      <form id="configForm">
        <label>
          <span>Listen address</span>
          <input id="configAddr" name="addr" autocomplete="off">
        </label>
        <label>
          <span>Music directories</span>
          <textarea id="configMusicDirs" name="music_dirs" rows="4" spellcheck="false"></textarea>
        </label>
        <label>
          <span>Database path</span>
          <input id="configDatabasePath" name="database_path" autocomplete="off">
        </label>
        <label>
          <span>Scan workers</span>
          <input id="configScanWorkers" name="scan_workers" type="number" min="1" max="256" step="1">
        </label>
        <div class="config-grid">
          <label>
            <span>PocketBase data directory</span>
            <input id="configAuthDataDir" autocomplete="off">
          </label>
          <label>
            <span>Bootstrap admin email</span>
            <input id="configBootstrapEmail" autocomplete="off">
          </label>
          <label>
            <span>Keycloak issuer URL</span>
            <input id="configKeycloakIssuer" autocomplete="off">
          </label>
          <label>
            <span>Keycloak client ID</span>
            <input id="configKeycloakClientID" autocomplete="off">
          </label>
          <label>
            <span>Keycloak client secret</span>
            <input id="configKeycloakClientSecret" type="password" autocomplete="off">
          </label>
          <label>
            <span>Keycloak display name</span>
            <input id="configKeycloakDisplayName" autocomplete="off">
          </label>
        </div>
        <label class="checkbox-label">
          <input id="configKeycloakEnabled" type="checkbox">
          <span>Enable Keycloak</span>
        </label>
        <section class="rooms-editor">
          <div class="section-head">
            <h2>Rooms</h2>
            <button id="addRoom" class="secondary compact" type="button">Add Room</button>
          </div>
          <div id="roomsList" class="rooms-list"></div>
        </section>
        <div class="form-actions">
          <button type="submit">Save</button>
        </div>
      </form>
    </section>
  </main>
  <script src="/admin.js"></script>
</body>
</html>
